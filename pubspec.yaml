name: livehub
description: "LiveHub - Professional Live Streaming Platform with Agora & RTMP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Agora RTC Engine (latest stable)
  agora_rtc_engine: ^6.3.2

  # Permissions
  permission_handler: ^11.3.1

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Storage & Persistence
  shared_preferences: ^2.3.3
  get_storage: ^2.1.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  equatable: ^2.0.5

  # Connectivity
  connectivity_plus: ^6.1.1

  # Device Info
  device_info_plus: ^10.1.2

  # Wakelock
  wakelock_plus: ^1.2.10

  # Timer
  stop_watch_timer: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
